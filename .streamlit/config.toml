[theme]
base = "dark"
primaryColor = "#3b82f6"
backgroundColor = "#0a0e1a"
secondaryBackgroundColor = "#0d1321"
textColor = "#e2e8f0"
font = "sans serif"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 200

[browser]
gatherUsageStats = false

[runner]
magicEnabled = false
